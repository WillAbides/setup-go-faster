systems:
  - darwin/amd64
  - darwin/arm64
  - linux/amd64
dependencies:
  action-doc:
    template: action-doc
    vars:
      version: 0.4.0
  shellcheck:
    template: origin#shellcheck
    vars:
      version: 0.11.0
  shfmt:
    template: origin#shfmt
    vars:
      version: 3.13.1
  shunit2:
    url: https://github.com/kward/shunit2/archive/{{.ref}}.tar.gz
    archive_path: ./shunit2-{{.ref}}/shunit2
    vars:
      ref: ebc4baa08f045b7ef0f45c4b7d6f34f08d732f3d
    required_vars:
      - ref
  zizmor:
    template: zizmor
    vars:
      version: 1.25.2
templates:
  action-doc:
    url: https://github.com/WillAbides/action-doc/releases/download/v{{.version}}/action-doc_{{.version}}_{{.os}}_{{.arch}}.tar.gz
    overrides:
      - matcher:
          arch:
            - arm64
          os:
            - darwin
        dependency:
          vars:
            arch: amd64
    systems:
      - darwin/amd64
      - darwin/arm64
      - linux/386
      - linux/amd64
    required_vars:
      - version
  origin#shellcheck:
    homepage: https://www.shellcheck.net
    description: ShellCheck, a static analysis tool for shell scripts
    url: https://github.com/koalaman/shellcheck/releases/download/v{{.version}}/shellcheck-v{{.version}}.{{.os}}.{{.arch}}{{.urlSuffix}}
    archive_path: shellcheck-v{{.version}}/shellcheck{{.archivePathSuffix}}
    bin: shellcheck
    vars:
      archivePathSuffix: ""
      urlSuffix: .tar.xz
    overrides:
      - matcher:
          os:
            - windows
        dependency:
          url: https://github.com/koalaman/shellcheck/releases/download/v{{.version}}/shellcheck-v{{.version}}.zip
          archive_path: shellcheck.exe
    substitutions:
      arch:
        amd64: x86_64
        arm: armv6hf
        arm64: aarch64
    systems:
      - darwin/amd64
      - darwin/arm64
      - linux/amd64
      - linux/arm
      - linux/arm64
      - windows/amd64
    required_vars:
      - version
  origin#shfmt:
    homepage: https://github.com/mvdan/sh
    description: A shell parser, formatter, and interpreter with bash support; includes shfmt
    url: https://github.com/mvdan/sh/releases/download/v{{.version}}/shfmt_v{{.version}}_{{.os}}_{{.arch}}{{.urlSuffix}}
    archive_path: shfmt_v{{.version}}_{{.os}}_{{.arch}}{{.urlSuffix}}
    bin: shfmt
    vars:
      archivePathSuffix: ""
      urlSuffix: ""
    overrides:
      - matcher:
          os:
            - windows
        dependency:
          vars:
            urlSuffix: .exe
    systems:
      - darwin/amd64
      - darwin/arm64
      - linux/386
      - linux/amd64
      - linux/arm
      - linux/arm64
      - windows/386
      - windows/amd64
    required_vars:
      - version
  zizmor:
    homepage: https://docs.zizmor.sh/
    description: Static analysis for GitHub Actions
    url: https://github.com/zizmorcore/zizmor/releases/download/v{{.version}}/zizmor-{{.arch}}-{{.os}}.tar.gz
    substitutions:
      arch:
        amd64: x86_64
        arm64: aarch64
      os:
        darwin: apple-darwin
        linux: unknown-linux-gnu
    systems:
      - darwin/amd64
      - darwin/arm64
      - linux/amd64
    required_vars:
      - version
template_sources:
  action-doc: https://raw.githubusercontent.com/WillAbides/action-doc/main/bindown.yml
  origin: https://raw.githubusercontent.com/WillAbides/bindown-templates/master/bindown.yml
