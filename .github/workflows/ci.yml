name: ci
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  pull_request:
    types: [ opened, synchronize, reopened ]
jobs:
  cibuild:
    name: cibuild
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - run: script/bootstrap
      - run: script/generate --check
      - run: script/lint

  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
          - windows-2022
          - macos-14
          - macos-15
          - macos-26
          - macos-26-intel
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - run: env
      - run: go env
      - uses: actions/checkout@v6
      - run: script/bootstrap
      - run: script/test
      - run: script/test -long
