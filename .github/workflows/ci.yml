name: ci
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read

jobs:
  cibuild:
    name: cibuild
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: script/bootstrap
      - run: script/generate --check
      - run: script/lint

  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
          - ubuntu-slim
          - windows-2022
          - windows-2025
          - macos-14
          - macos-15
          - macos-26
          - macos-26-intel
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - run: env
      - run: go env
        continue-on-error: true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: script/bootstrap
      - run: script/test
      - run: script/test -long
