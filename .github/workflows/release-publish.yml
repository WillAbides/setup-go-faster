name: release-publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: git config
        run: |
          git config --local user.name '${{ github.actor }}'
          git config --local user.email '${{ github.actor }}@users.noreply.github.com'
      - name: release-train
        id: release
        uses: WillAbides/release-train@a234a745371bf2fef3d64d74e1e9381aa9e6d4f8 # v3.8.6
        with:
          create-release: true
          release-refs: main
          pre-tag-hook: .github/workflows/script/release-pre-tag
      - name: Advance major version branch
        if: steps.release.outputs.created-tag == 'true'
        env:
          TAG: ${{ steps.release.outputs.release-tag }}
        run: .github/workflows/script/advance-major-branch
