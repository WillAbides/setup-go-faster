name: release-publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASER_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token }}
      - name: git config
        run: |
          git config --local user.name '${{ github.actor }}'
          git config --local user.email '${{ github.actor }}@users.noreply.github.com'
      - name: debug — tag pattern bisect
        run: |
          set +e
          for TAG in v1.18.0-0 v1.18.0-rc1 v1.18.0 v999.999.999-0 v999.999.999-rc1; do
            echo "=========================================="
            echo "=== Trying tag: $TAG ==="
            echo "=========================================="
            # Fresh commit for each iteration so we're not testing tag replacement
            date +%s%N > runid.txt
            git add runid.txt
            git commit -m "test commit for $TAG"
            git tag -f "$TAG"
            if git push origin "$TAG"; then
              echo "::notice::OK $TAG"
              git push origin ":$TAG"
            else
              echo "::error::FAIL $TAG (exit $?)"
            fi
            echo
          done
          exit 0
