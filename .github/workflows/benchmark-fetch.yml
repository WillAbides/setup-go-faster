name: benchmark-fetch
on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: fetch go.dev all-releases JSON
        id: godev
        run: |
          start=$(date +%s%N)
          wire=$(curl -sSfL -w '%{size_download}' -o all.json "https://go.dev/dl/?mode=json&include=all")
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          size=$(wc -c < all.json)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          echo "wire=$wire" >> "$GITHUB_OUTPUT"
          printf 'go.dev fetch: %s ms (wire %s bytes, disk %s bytes)\n' "$elapsed_ms" "$wire" "$size"

      - name: fetch go.dev all-releases JSON (compressed)
        id: godev_gz
        run: |
          start=$(date +%s%N)
          wire=$(curl -sSfL --compressed -w '%{size_download}' -o all_gz.json "https://go.dev/dl/?mode=json&include=all")
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          size=$(wc -c < all_gz.json)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          echo "wire=$wire" >> "$GITHUB_OUTPUT"
          printf 'go.dev fetch (compressed): %s ms (wire %s bytes, disk %s bytes)\n' "$elapsed_ms" "$wire" "$size"

      # The default ?mode=json (no include=all) endpoint returns just
      # [latest_stable, latest_oldstable] â€” ~23 KB raw, ~6 KB gzipped.
      # This is what the new resolve_constraint_alias uses for the
      # stable / oldstable shortcuts, replacing the goreleases hit.
      - name: fetch go.dev default ?mode=json (stable+oldstable only)
        id: godev_stable
        run: |
          start=$(date +%s%N)
          wire=$(curl -sSfL -w '%{size_download}' -o stable.json "https://go.dev/dl/?mode=json")
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          size=$(wc -c < stable.json)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          echo "wire=$wire" >> "$GITHUB_OUTPUT"
          printf 'go.dev fetch (default mode): %s ms (wire %s bytes, disk %s bytes)\n' "$elapsed_ms" "$wire" "$size"

      - name: fetch go.dev default ?mode=json (compressed)
        id: godev_stable_gz
        run: |
          start=$(date +%s%N)
          wire=$(curl -sSfL --compressed -w '%{size_download}' -o stable_gz.json "https://go.dev/dl/?mode=json")
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          size=$(wc -c < stable_gz.json)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          echo "wire=$wire" >> "$GITHUB_OUTPUT"
          printf 'go.dev fetch (default mode, compressed): %s ms (wire %s bytes, disk %s bytes)\n' "$elapsed_ms" "$wire" "$size"

      - name: fetch goreleases versions.txt
        id: goreleases
        run: |
          start=$(date +%s%N)
          curl -sSfL -o versions.txt "https://raw.githubusercontent.com/WillAbides/goreleases/main/versions.txt"
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          size=$(wc -c < versions.txt)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          printf 'goreleases fetch: %s ms (%s bytes)\n' "$elapsed_ms" "$size"

      - name: jq transform JSON to versions
        id: jq
        run: |
          start=$(date +%s%N)
          jq -r '.[].version' all.json > derived.txt
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          size=$(wc -c < derived.txt)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          printf 'jq transform: %s ms (%s bytes)\n' "$elapsed_ms" "$size"

      - name: fetch go.dev and pipe through jq (no intermediate file)
        id: godev_piped
        run: |
          start=$(date +%s%N)
          curl -sSfL "https://go.dev/dl/?mode=json&include=all" | jq -r '.[].version' > versions_from_godev.txt
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          size=$(wc -c < versions_from_godev.txt)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          printf 'go.dev | jq (piped): %s ms (%s bytes out)\n' "$elapsed_ms" "$size"

      - name: fetch go.dev (compressed) and pipe through jq
        id: godev_piped_gz
        run: |
          start=$(date +%s%N)
          curl -sSfL --compressed "https://go.dev/dl/?mode=json&include=all" | jq -r '.[].version' > versions_from_godev_gz.txt
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          size=$(wc -c < versions_from_godev_gz.txt)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          printf 'go.dev (compressed) | jq (piped): %s ms (%s bytes out)\n' "$elapsed_ms" "$size"

      - name: fetch goversion-select linux_amd64 release asset
        id: gvsbin
        run: |
          start=$(date +%s%N)
          curl -sSfL -o goversion-select \
            "https://github.com/WillAbides/setup-go-faster/releases/download/v1.19.0/goversion-select_linux_amd64"
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          size=$(wc -c < goversion-select)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          printf 'goversion-select fetch: %s ms (%s bytes)\n' "$elapsed_ms" "$size"

      # â”€â”€â”€ streaming-JSON pipeline (prototype: PR-test/willabides/json-stream-goversion-select) â”€â”€â”€
      #
      # The new flow on the json-stream branch curls go.dev's
      # ?mode=json&include=all payload directly into goversion-select
      # --json-input and exits on the first match. Because go.dev returns
      # the array semver-descending, the *latest* matching version is also
      # the first match â€” goversion-select exits, curl receives SIGPIPE,
      # and the TCP transfer short-circuits. The deeper in the stream the
      # match lives, the more bytes we have to read first.
      #
      # The constraints below sample best-case (1.26.x = first element)
      # through worst-case (1.10.x = near the end). The expectation is
      # that wall-clock + wire bytes scale roughly with match depth.
      - name: install Go 1.26 for streaming binary build
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          check-latest: false

      - name: build goversion-select with --json-input
        id: gvsstream_build
        run: |
          git clone --depth 1 --branch willabides/json-stream-goversion-select \
            https://github.com/WillAbides/setup-go-faster.git stream-src
          cd stream-src
          start=$(date +%s%N)
          GOEXPERIMENT=jsonv2 CGO_ENABLED=0 go -C tools/goversion-select build \
            -trimpath -ldflags='-s -w' -o "$GITHUB_WORKSPACE/goversion-select-stream" .
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          size=$(wc -c < "$GITHUB_WORKSPACE/goversion-select-stream")
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
          printf 'goversion-select build: %s ms (binary %s bytes)\n' "$elapsed_ms" "$size"

      # Run the streaming pipeline once per representative constraint and
      # capture wall-clock + best-effort wire bytes. `tee >(wc -c > F)`
      # counts bytes that made it through to the downstream consumer;
      # tee gets SIGPIPE when goversion-select exits, propagating EOF to
      # the wc -c branch which writes the count before exiting.
      - name: stream-pipeline 1.26.x (first match â€” best case)
        id: stream_126x
        run: |
          bytes_file=$(mktemp)
          start=$(date +%s%N)
          set +o pipefail
          curl -sfL --compressed --retry 4 "https://go.dev/dl/?mode=json&include=all" \
            | tee --output-error=exit >(wc -c > "$bytes_file") \
            | "$GITHUB_WORKSPACE/goversion-select-stream" --orig --json-input -c '1.26.x' \
            > match.txt
          set -o pipefail
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          wait
          bytes=$(tr -d ' ' < "$bytes_file")
          match=$(cat match.txt)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "bytes=$bytes" >> "$GITHUB_OUTPUT"
          echo "match=$match" >> "$GITHUB_OUTPUT"
          printf '1.26.x: %s ms (read ~%s bytes, matched %s)\n' "$elapsed_ms" "$bytes" "$match"

      - name: stream-pipeline 1.25.x (near top)
        id: stream_125x
        run: |
          bytes_file=$(mktemp)
          start=$(date +%s%N)
          set +o pipefail
          curl -sfL --compressed --retry 4 "https://go.dev/dl/?mode=json&include=all" \
            | tee --output-error=exit >(wc -c > "$bytes_file") \
            | "$GITHUB_WORKSPACE/goversion-select-stream" --orig --json-input -c '1.25.x' \
            > match.txt
          set -o pipefail
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          wait
          bytes=$(tr -d ' ' < "$bytes_file")
          match=$(cat match.txt)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "bytes=$bytes" >> "$GITHUB_OUTPUT"
          echo "match=$match" >> "$GITHUB_OUTPUT"
          printf '1.25.x: %s ms (read ~%s bytes, matched %s)\n' "$elapsed_ms" "$bytes" "$match"

      - name: stream-pipeline 1.21.x (mid-stream)
        id: stream_121x
        run: |
          bytes_file=$(mktemp)
          start=$(date +%s%N)
          set +o pipefail
          curl -sfL --compressed --retry 4 "https://go.dev/dl/?mode=json&include=all" \
            | tee --output-error=exit >(wc -c > "$bytes_file") \
            | "$GITHUB_WORKSPACE/goversion-select-stream" --orig --json-input -c '1.21.x' \
            > match.txt
          set -o pipefail
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          wait
          bytes=$(tr -d ' ' < "$bytes_file")
          match=$(cat match.txt)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "bytes=$bytes" >> "$GITHUB_OUTPUT"
          echo "match=$match" >> "$GITHUB_OUTPUT"
          printf '1.21.x: %s ms (read ~%s bytes, matched %s)\n' "$elapsed_ms" "$bytes" "$match"

      - name: stream-pipeline 1.10.x (deep in stream â€” worst case)
        id: stream_110x
        run: |
          bytes_file=$(mktemp)
          start=$(date +%s%N)
          set +o pipefail
          curl -sfL --compressed --retry 4 "https://go.dev/dl/?mode=json&include=all" \
            | tee --output-error=exit >(wc -c > "$bytes_file") \
            | "$GITHUB_WORKSPACE/goversion-select-stream" --orig --json-input -c '1.10.x' \
            > match.txt
          set -o pipefail
          end=$(date +%s%N)
          elapsed_ms=$(( (end - start) / 1000000 ))
          wait
          bytes=$(tr -d ' ' < "$bytes_file")
          match=$(cat match.txt)
          echo "elapsed_ms=$elapsed_ms" >> "$GITHUB_OUTPUT"
          echo "bytes=$bytes" >> "$GITHUB_OUTPUT"
          echo "match=$match" >> "$GITHUB_OUTPUT"
          printf '1.10.x: %s ms (read ~%s bytes, matched %s)\n' "$elapsed_ms" "$bytes" "$match"

      - name: summary
        run: |
          {
            echo "| step | elapsed (ms) | wire (bytes) | disk/out (bytes) |"
            echo "|---|---:|---:|---:|"
            echo "| go.dev fetch (all-releases JSON)             | ${{ steps.godev.outputs.elapsed_ms }} | ${{ steps.godev.outputs.wire }} | ${{ steps.godev.outputs.size }} |"
            echo "| go.dev fetch (gzip, --compressed)            | ${{ steps.godev_gz.outputs.elapsed_ms }} | ${{ steps.godev_gz.outputs.wire }} | ${{ steps.godev_gz.outputs.size }} |"
            echo "| go.dev fetch (default ?mode=json, stable+oldstable)        | ${{ steps.godev_stable.outputs.elapsed_ms }} | ${{ steps.godev_stable.outputs.wire }} | ${{ steps.godev_stable.outputs.size }} |"
            echo "| go.dev fetch (default ?mode=json, gzip)                    | ${{ steps.godev_stable_gz.outputs.elapsed_ms }} | ${{ steps.godev_stable_gz.outputs.wire }} | ${{ steps.godev_stable_gz.outputs.size }} |"
            echo "| goreleases fetch (versions.txt)              | ${{ steps.goreleases.outputs.elapsed_ms }} | â€” | ${{ steps.goreleases.outputs.size }} |"
            echo "| jq transform                                 | ${{ steps.jq.outputs.elapsed_ms }} | â€” | ${{ steps.jq.outputs.size }} |"
            echo "| go.dev \| jq (piped, end-to-end)             | ${{ steps.godev_piped.outputs.elapsed_ms }} | â€” | ${{ steps.godev_piped.outputs.size }} |"
            echo "| go.dev (gzip) \| jq (piped, end-to-end)      | ${{ steps.godev_piped_gz.outputs.elapsed_ms }} | â€” | ${{ steps.godev_piped_gz.outputs.size }} |"
            echo "| goversion-select_linux_amd64 release asset   | ${{ steps.gvsbin.outputs.elapsed_ms }} | â€” | ${{ steps.gvsbin.outputs.size }} |"
            echo ""
            echo "### streaming-JSON pipeline (early-exit on first match)"
            echo "Build (Go 1.26 + GOEXPERIMENT=jsonv2): ${{ steps.gvsstream_build.outputs.elapsed_ms }} ms, binary ${{ steps.gvsstream_build.outputs.size }} bytes."
            echo ""
            echo "| constraint | matched | elapsed (ms) | bytes through tee |"
            echo "|---|---|---:|---:|"
            echo "| 1.26.x (first element)  | ${{ steps.stream_126x.outputs.match }} | ${{ steps.stream_126x.outputs.elapsed_ms }} | ${{ steps.stream_126x.outputs.bytes }} |"
            echo "| 1.25.x (near top)       | ${{ steps.stream_125x.outputs.match }} | ${{ steps.stream_125x.outputs.elapsed_ms }} | ${{ steps.stream_125x.outputs.bytes }} |"
            echo "| 1.21.x (mid-stream)     | ${{ steps.stream_121x.outputs.match }} | ${{ steps.stream_121x.outputs.elapsed_ms }} | ${{ steps.stream_121x.outputs.bytes }} |"
            echo "| 1.10.x (deep in stream) | ${{ steps.stream_110x.outputs.match }} | ${{ steps.stream_110x.outputs.elapsed_ms }} | ${{ steps.stream_110x.outputs.bytes }} |"
          } >> "$GITHUB_STEP_SUMMARY"
