# yaml-language-server: $schema=https://raw.githubusercontent.com/zizmorcore/zizmor/main/support/zizmor.schema.json

rules:
  artipacked:
    # release-publish.yml's checkout intentionally persists credentials so the
    # "Advance major version branch" step can `git push origin "$commit:refs/heads/$major"`.
    # That step runs only on push to main, gated by `permissions: contents: write`
    # which is already scoped narrowly. No other step in the job needs the token,
    # so the residual risk is limited to release-train and the explicit push.
    ignore:
      - release-publish.yml
